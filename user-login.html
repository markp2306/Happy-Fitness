<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login | Happy Fitness</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div style="display: flex; align-items: center; gap: 1rem;">
            <img src="logo.jpeg" alt="Logo" style="height: 40px; border-radius: 5px;">
            <a href="index.html" class="logo">HAPPY <span>FITNESS</span></a>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="workouts.html">Workouts</a></li>
        </ul>
        <a href="user-login.html" class="nav-btn">User Login</a>
    </nav>

    <!-- User Auth Section -->
    <section class="auth-container" style="padding-top: 15rem;">
        <form class="auth-form" id="userAuthForm" style="max-height: 90vh; overflow-y: auto;">
            <h2 id="authTitle">User <span>Login</span></h2>
            
            <div id="registerFields" style="display: none;">
                <div class="form-group">
                    <label for="userName">Full Name</label>
                    <input type="text" id="userName" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="assignedTrainer">Select Your Trainer</label>
                    <select id="assignedTrainer" style="width: 100%; padding: 0.8rem 1rem; background: var(--bg-color); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 5px; color: white; outline: none;">
                        <option value="mark@happyfitness.com">Mark</option>
                        <option value="trainer2@happyfitness.com">Sarah</option>
                        <option value="trainer3@happyfitness.com">Alex</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="user@example.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="auth-btn">Log In</button>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
                <span id="toggleText">New to Happy Fitness?</span> 
                <a href="#" id="toggleAuth" style="color: var(--accent-color);">Register here</a>
            </p>
        </form>
    </section>

    <!-- Footer -->
    <footer>
        <div class="copyright">
            &copy; 2026 Happy Fitness User Portal. <button id="hideFooterBtn" class="hide-footer-btn">OK</button>
        </div>
    </footer>

    <script type="module">
        import { auth, db } from './js/firebase-config.js';
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { collection, doc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const form = document.getElementById('userAuthForm');
        const authTitle = document.getElementById('authTitle');
        const toggleAuth = document.getElementById('toggleAuth');
        const toggleText = document.getElementById('toggleText');
        const registerFields = document.getElementById('registerFields');
        const trainerSelect = document.getElementById('assignedTrainer');
        let isLogin = true;

        async function populateTrainers() {
            try {
                const querySnapshot = await getDocs(collection(db, "trainers"));
                let trainers = [];
                querySnapshot.forEach((doc) => {
                    trainers.push(doc.data());
                });

                if (trainers.length === 0) {
                    trainerSelect.innerHTML = '<option value="" disabled>No trainers registered yet</option>';
                } else {
                    trainerSelect.innerHTML = trainers.map(t => `<option value="${t.email}">${t.name}</option>`).join('');
                }
            } catch (error) {
                console.error("Error fetching trainers:", error);
                trainerSelect.innerHTML = '<option value="mark@happyfitness.com">Mark (Default)</option>';
            }
        }

        // Initial load for login state
        if (!isLogin) populateTrainers();

        toggleAuth.addEventListener('click', async (e) => {
            e.preventDefault();
            isLogin = !isLogin;
            authTitle.innerHTML = isLogin ? 'User <span>Login</span>' : 'User <span>Register</span>';
            toggleAuth.innerText = isLogin ? 'Register here' : 'Login here';
            toggleText.innerText = isLogin ? 'New to Happy Fitness?' : 'Already have an account?';
            registerFields.style.display = isLogin ? 'none' : 'block';
            document.querySelector('.auth-btn').innerText = isLogin ? 'Log In' : 'Create Account';

            if (!isLogin) await populateTrainers();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('.auth-btn');
            btn.classList.add('loading');
            btn.disabled = true;

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                    
                    // Fetch user info from Firestore to get trainer
                    const usersSnap = await getDocs(collection(db, "users"));
                    const userDoc = Array.from(usersSnap.docs).map(d => d.data()).find(u => u.email === email);
                    
                    if (userDoc) {
                        localStorage.setItem('userLoggedIn', 'true');
                        localStorage.setItem('userEmail', email);
                        localStorage.setItem('userName', userDoc.name);
                        localStorage.setItem('userAssignedTrainer', userDoc.trainer);
                        window.location.href = 'workouts.html';
                    } else {
                        alert('User profile not found in database');
                        btn.classList.remove('loading');
                        btn.disabled = false;
                    }
                } else {
                    const name = document.getElementById('userName').value;
                    const trainer = document.getElementById('assignedTrainer').value;
                    
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    
                    // Save user profile to Firestore
                    await setDoc(doc(db, "users", userCredential.user.uid), {
                        name: name,
                        email: email,
                        trainer: trainer,
                        role: 'user',
                        createdAt: new Date().toISOString(),
                        status: 'Active'
                    });

                    localStorage.setItem('userLoggedIn', 'true');
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('userName', name);
                    localStorage.setItem('userAssignedTrainer', trainer);
                    window.location.href = 'workouts.html';
                }
            } catch (error) {
                alert(error.message);
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        });
    </script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
